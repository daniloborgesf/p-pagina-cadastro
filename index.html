<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Cadastro</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <main>
        <h1> Criar Conta</h1>
        <div class="social-media">
            <a href="#"><img src="assets/img/google.png" alt="google-image"></a>
            <a href="#"><img src="assets/img/facebook.png" alt="facebook-image"></a>
            <a href="#"><img src="assets/img/linkedin.png" alt="linkedin-image"></a>
        </div>
        <div class="alternative"><span>ou</span></div>
        <form action="">
            <label for="name">
                <span>Nome:</span>
                <input type="text" id="name" name="name">
            </label>
            <label for="email">
                <span>E-mail:</span>
                <input type="text" id="email" name="email">
            </label>
            <label for="password">
                <span>Senha:</span>
                <input type="text" id="password" name="password">
            </label>

            <input type="submit" value="Criar Conta">
        </form>
    </main>
    <section class="images">
        <img src="assets/img/mobile.svg" alt="mobile-image">
        <div class="circle">.</div>
    </section>
</body>

</html>
